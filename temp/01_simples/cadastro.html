<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadastro &mdash; Cursos FICs</title>
  <link rel="stylesheet" href="assets/css/styles.css">
  <link rel="stylesheet" href="assets/css/cadastro.css">
</head>
<body>

  <header class="header">
    <div class="container header-inner">
      <a href="index.html" class="brand">Cursos FICs</a>
      <nav class="nav">
        <a href="index.html">Início</a>
        <a href="cursos.html">Cursos</a>
        <a href="#contato">Contato</a>
      </nav>
      <div class="header-actions">
        <a href="login.html" class="btn btn-outline">Login</a>
        <a href="cadastro.html" class="btn btn-primary">Cadastro</a>
      </div>
      <button class="hamburger" aria-label="Abrir menu" aria-expanded="false">
        <span></span><span></span><span></span>
      </button>
    </div>
    <nav class="mobile-nav">
      <a href="index.html">Início</a>
      <a href="cursos.html">Cursos</a>
      <a href="#contato">Contato</a>
      <a href="login.html">Login</a>
      <a href="cadastro.html">Cadastro</a>
    </nav>
  </header>

  <main>
    <div class="cadastro-card">
      <h1>Criar Conta</h1>

      <form>
        <div class="form-row">
          <div class="form-group">
            <label for="nome">Nome</label>
            <input type="text" id="nome" placeholder="João" required>
          </div>
          <div class="form-group">
            <label for="sobrenome">Sobrenome</label>
            <input type="text" id="sobrenome" placeholder="Silva" required>
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="username">Nome de usuário</label>
            <input type="text" id="username" placeholder="joaosilva" required>
          </div>
          <div class="form-group">
            <label for="cpf">CPF</label>
            <input type="text" id="cpf" placeholder="000.000.000-00" required>
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="email">E-mail</label>
            <input type="email" id="email" placeholder="seu@email.com" required>
          </div>
          <div class="form-group">
            <label for="nascimento">Data de nascimento</label>
            <input type="date" id="nascimento" required>
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="senha">Senha</label>
            <input type="password" id="senha" placeholder="••••••••" required>
          </div>
          <div class="form-group">
            <label for="confirma">Confirmação de senha</label>
            <input type="password" id="confirma" placeholder="••••••••" required>
          </div>
        </div>

        <button type="submit" class="btn btn-primary">Criar conta</button>
      </form>

      <p class="login-link">Já tem conta? <a href="login.html">Entrar</a></p>
    </div>
  </main>

  <footer class="footer" id="contato">
    <div class="container">
      <p>&copy; 2026 Cursos FICs &middot; IFRN</p>
    </div>
  </footer>

  <script src="assets/js/script.js"></script>
</body>
</html>
