<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login &mdash; Cursos FICs</title>
  <link rel="stylesheet" href="assets/css/styles.css">
  <link rel="stylesheet" href="assets/css/login.css">
</head>
<body>

  <header class="header">
    <div class="container header-inner">
      <a href="index.html" class="brand">Cursos FICs</a>
      <nav class="nav">
        <a href="index.html">Início</a>
        <a href="cursos.html">Cursos</a>
        <a href="#contato">Contato</a>
      </nav>
      <div class="header-actions">
        <a href="login.html" class="btn btn-outline">Login</a>
        <a href="cadastro.html" class="btn btn-primary">Cadastro</a>
      </div>
      <button class="hamburger" aria-label="Abrir menu" aria-expanded="false">
        <span></span><span></span><span></span>
      </button>
    </div>
    <nav class="mobile-nav">
      <a href="index.html">Início</a>
      <a href="cursos.html">Cursos</a>
      <a href="#contato">Contato</a>
      <a href="login.html">Login</a>
      <a href="cadastro.html">Cadastro</a>
    </nav>
  </header>

  <main>
    <div class="login-card">
      <h1>Entrar</h1>

      <form>
        <div class="form-group">
          <label for="email">E-mail</label>
          <input type="email" id="email" placeholder="seu@email.com" required>
        </div>

        <div class="form-group">
          <label for="senha">Senha</label>
          <input type="password" id="senha" placeholder="••••••••" required>
        </div>

        <a href="#" class="forgot">Esqueci minha senha</a>

        <button type="submit" class="btn btn-primary">Entrar</button>
      </form>

      <p class="register-link">Não tem conta? <a href="cadastro.html">Cadastre-se</a></p>
    </div>
  </main>

  <footer class="footer" id="contato">
    <div class="container">
      <p>&copy; 2026 Cursos FICs &middot; IFRN</p>
    </div>
  </footer>

  <script src="assets/js/script.js"></script>
</body>
</html>
